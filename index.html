<!DOCTYPE html>
<html>
<head>
    <title>POSTURA Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #333;
        }

        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            margin: 20px auto;
            padding: 25px;
            width: 95%;
            max-width: 550px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .big-text {
            font-size: 22px;
            font-weight: 600;
        }

        .value-text {
            font-size: 26px;
            font-weight: bold;
        }

        button {
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            background: #4e73df;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e59d9;
        }

        .disconnect-btn {
            background: #e74a3b;
        }

        .disconnect-btn:hover {
            background: #c0392b;
        }

        .history-item {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 10px;
            background: #f8f9fc;
            border-left: 5px solid #4e73df;
            text-align: left;
            font-size: 15px;
        }

        canvas {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>POSTURA</h1>

<div class="card">
    <p class="big-text">Status: <span id="status">Disconnected</span></p>
    <p class="big-text">Device: <span id="deviceName">-</span></p>
    <button onclick="connectBLE()">Connect</button>
    <button class="disconnect-btn" onclick="disconnectBLE()">Disconnect</button>
</div>

<div class="card">
    <p class="big-text">Current Angle</p>
    <p class="value-text"><span id="angle">0</span>°</p>

    <p class="big-text">Slouch Count</p>
    <p class="value-text"><span id="slouchCount">0</span></p>

    <p class="big-text">Total Slouch Time</p>
    <p class="value-text"><span id="slouchTime">0</span> sec</p>

    <p class="big-text">Session Duration</p>
    <p class="value-text"><span id="sessionDuration">0</span> sec</p>

    <p class="big-text">Posture Score</p>
    <p class="value-text"><span id="postureScore">100</span>%</p>
</div>

<div class="card">
    <h2>Session History</h2>
    <div id="historyContainer"></div>
    <button onclick="clearHistory()">Clear History</button>
</div>

<div class="card">
    <h2>Posture Score Trend</h2>
    <canvas id="postureChart"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
