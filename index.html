<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>POSTURA – Smart Posture Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>POSTURA</h1>
  <p id="status">Disconnected</p>

  <button id="connectBtn">Connect Device</button>
  <button id="resetBtn">Reset Session</button>

  <div class="cards">

    <div class="card">
      <h3>Current Angle</h3>
      <p id="angle">0°</p>
    </div>

    <div class="card">
      <h3>Slouch Count</h3>
      <p id="slouchCount">0</p>
    </div>

    <div class="card">
      <h3>Total Slouch Time</h3>
      <p id="slouchTime">0 sec</p>
    </div>

  </div>

  <div class="graph-section">
    <h3>Posture Angle Graph</h3>
    <canvas id="angleChart"></canvas>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
