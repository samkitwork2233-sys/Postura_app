<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>POSTURA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

  <h1>POSTURA</h1>
  <p id="status" class="disconnected">Disconnected</p>

  <button id="connectBtn">Connect Device</button>

  <div class="grid">

    <div class="card">
      <h3>Angle</h3>
      <p id="angle">0°</p>
    </div>

    <div class="card">
      <h3>Slouch Count</h3>
      <p id="slouchCount">0</p>
    </div>

    <div class="card">
      <h3>Slouch Time</h3>
      <p id="slouchTime">00:00</p>
    </div>

    <div class="card scoreCard">
      <h3>Score</h3>
      <div class="circle">
        <span id="score">100</span>
      </div>
      <p id="postureStatus">GOOD</p>
    </div>

  </div>

  <div class="controls">
    Sensitivity: <span id="sensitivityValue">10</span>°
    <input type="range" id="slider" min="5" max="30" value="10">
    <br><br>
    <button id="resetBtn">Reset</button>
    <button id="endSession">End Session</button>
    <button id="clearHistory">Clear History</button>
  </div>

  <h2>Live Graph</h2>
  <canvas id="chart"></canvas>

  <h2>Session History</h2>
  <div id="history"></div>

</div>

<script src="script.js"></script>
</body>
</html>
