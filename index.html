<!DOCTYPE html>
<html>
<head>
    <title>POSTURA Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
        }

        .card {
            background: white;
            margin: 15px auto;
            padding: 20px;
            width: 95%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            margin: 8px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .history-item {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            background: #fafafa;
            border: 1px solid #ddd;
            text-align: left;
        }
    </style>
</head>

<body>

<h2>POSTURA Dashboard</h2>

<div class="card">
    <p><b>Status:</b> <span id="status">Disconnected</span></p>
    <p><b>Device:</b> <span id="deviceName">-</span></p>
    <button onclick="connectBLE()">Connect</button>
    <button onclick="disconnectBLE()">Disconnect</button>
</div>

<div class="card">
    <p>Current Angle: <span id="angle">0</span>°</p>
    <p>Slouch Count: <span id="slouchCount">0</span></p>
    <p>Total Slouch Time: <span id="slouchTime">0</span> sec</p>
    <p>Session Duration: <span id="sessionDuration">0</span> sec</p>
    <p>Posture Score: <span id="postureScore">100</span>%</p>
</div>

<div class="card">
    <h3>Session History</h3>
    <div id="historyContainer"></div>
    <button onclick="clearHistory()">Clear History</button>
</div>

<div class="card">
    <h3>Posture Score Trend</h3>
    <canvas id="postureChart"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
